name: "Feature request"
description: "Propose a new capability or a change to existing behavior."
title: "[feat] "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Feature ideas welcome. If this is a data contribution (atlas names, buffs, preload)
        please use the Contribute buttons in the overlay's Entity Atlas / Buffs / Preload
        tabs instead — those flow into the community pipeline directly.
  - type: textarea
    id: problem
    attributes:
      label: "Problem"
      description: "What are you trying to do that's currently hard or impossible?"
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: "Proposal"
      description: "What should POE2GPS do?"
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: "Alternatives considered (optional)"
    validations:
      required: false
