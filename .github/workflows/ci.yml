name: ci

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  build-test-gate:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      - name: Compliance gate self-test
        shell: pwsh
        run: pwsh scripts/compliance-gate.ps1 -SelfTest

      - name: Compliance gate
        shell: pwsh
        run: pwsh scripts/compliance-gate.ps1

      - name: Attribution sentinel gate (Draft mode)
        shell: pwsh
        # EC2-ATTR-DRAFT ships this in Draft mode. EC2-ATTR-FORMALIZE flips the arg
        # to `-Mode Formalize` once the syrairc DM (PMS-12) lands and the sentinels
        # get grep-and-swapped for the real license + pinned commit hash.
        run: pwsh scripts/attribution-sentinel-gate.ps1 -Mode Draft

      - name: Scrub self-test
        shell: pwsh
        run: pwsh scripts/scrub-strings.ps1 -SelfTest

      - name: Build
        run: dotnet build POE2Radar.slnx -c Release

      - name: Test
        run: dotnet test POE2Radar.slnx -c Release
