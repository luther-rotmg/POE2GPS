name: release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.1.0 && git push origin v0.1.0
# This builds a self-contained single-file Windows x64 exe and attaches it to a GitHub Release.

on:
  push:
    tags: ["v*"]
  workflow_dispatch: {}   # allow manual runs from the Actions tab

permissions:
  contents: write          # needed to create the Release

jobs:
  build:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: "10.0.x"

      # Cost optimization: cache NuGet packages so `dotnet publish`'s restore step skips
      # network round-trips. Saves ~30-60s per release build.
      - name: Cache NuGet packages
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/*.slnx', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Publish self-contained single-file overlay
        shell: pwsh
        run: |
          # Derive the baked-in assembly version straight from the tag (v0.8.1 -> 0.8.1) so the
          # binary can never disagree with the release it ships in, regardless of the csproj value.
          $ver = "${{ github.ref_name }}".TrimStart('v')
          dotnet publish src/POE2Radar.Overlay/POE2Radar.Overlay.csproj `
            -c Release -r win-x64 --self-contained true `
            -p:PublishSingleFile=true `
            -p:IncludeNativeLibrariesForSelfExtract=true `
            -p:EnableCompressionInSingleFile=false `
            -p:Version=$ver `
            -p:DebugType=none -p:DebugSymbols=false `
            -p:Deterministic=true -p:ContinuousIntegrationBuild=true `
            -o publish
          Remove-Item publish/*.pdb -Force -ErrorAction SilentlyContinue
          # Identity hygiene: scrub credit/URL tokens from the shipped exe (compression off above so
          # the scrub can reach bundled managed strings).
          pwsh scripts/scrub-strings.ps1 -ExePath publish/Overlay.exe
          if ($LASTEXITCODE -ne 0) { throw "string-scrub failed" }

      - name: Package
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          Copy-Item README.md, LICENSE, CHANGELOG.md publish/
          Compress-Archive -Path publish/* -DestinationPath "POE2GPS-$tag-win-x64.zip" -Force

      - name: Write SHA-256 checksum
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          $zip = "POE2GPS-$tag-win-x64.zip"
          $hash = (Get-FileHash $zip -Algorithm SHA256).Hash.ToLower()
          # sha256sum format: "<hash><space><space><filename>"
          "$hash  $zip" | Set-Content -Path "POE2GPS-$tag-sha256.txt" -Encoding ascii -NoNewline

      - name: Extract changelog notes for this tag
        shell: pwsh
        run: |
          # Pull the matching "## [X.Y.Z]" section out of CHANGELOG.md so the GitHub Release body
          # carries real patch notes (the auto-generated compare link is still appended below).
          $ver = "${{ github.ref_name }}".TrimStart('v')
          $out = New-Object System.Collections.Generic.List[string]
          $capture = $false
          foreach ($l in (Get-Content CHANGELOG.md)) {
            if ($l -match '^##\s+\[') {
              if ($capture) { break }                                  # next release section -> stop
              if ($l -match "^##\s+\[$([regex]::Escape($ver))\]") { $capture = $true; continue }  # skip the heading itself
            }
            if ($capture) { $out.Add($l) }
          }
          $body = ($out -join "`n").Trim()
          if ([string]::IsNullOrWhiteSpace($body)) { $body = "Release $ver" }
          $body | Set-Content -Path RELEASE_NOTES.md -Encoding utf8
          Write-Host "Release notes ($($out.Count) lines) for $ver written to RELEASE_NOTES.md"

      - name: Create / update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            POE2GPS-*-win-x64.zip
            POE2GPS-*-sha256.txt
          body_path: RELEASE_NOTES.md
          generate_release_notes: true
