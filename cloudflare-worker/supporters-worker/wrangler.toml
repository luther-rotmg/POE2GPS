name = "poe2gps-supporters"
main = "worker.js"
compatibility_date = "2026-06-01"

# Secrets set via `wrangler secret put NAME` — never checked into git.
# Required:
#   KO_FI_VERIFICATION_TOKEN
#   SIGNING_PRIVATE_KEY_HEX
# Recommended (email delivery):
