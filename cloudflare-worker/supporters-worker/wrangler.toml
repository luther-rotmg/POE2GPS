#   DISCORD_BOT_TOKEN
#   DISCORD_GUILD_ID
#   DISCORD_SUPPORTER_ROLE_ID
# Optional (Discord announce channel):
#   DISCORD_ANNOUNCE_WEBHOOK
# Optional (admin bearer):
#   ADMIN_TOKEN
